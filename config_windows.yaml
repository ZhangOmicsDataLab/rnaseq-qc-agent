run:
run:
  threads: 4
  require_approval: true
  overwrite: true

tools:
  fastqc:
    enabled: true
    command: "scripts/run_fastqc_windows.bat"
    version: "FastQC v0.12.1"
    extra_args: []

  multiqc:
    enabled: true
    force: true
    data_format: tsv

report:
  include_command_stderr: true
  include_software_versions: true
  include_sample_table: true
  include_qc_interpretation: true
  write_json_summary: true

llm:
  enabled: false
  provider: openai

  # Choose one: openai or ollama
  provider: openai

  openai:
    model: gpt-5.2
    temperature: 0.1
    max_input_rows: 200
    max_input_chars: 12000

  ollama:
    model: llama3.1
    temperature: 0.1
    max_input_rows: 200
    max_input_chars: 12000
